                  - generic [ref=e675]:
                    - text: When George Washington commandeered the building site that would eventually become Gracie Mansion, he probably didn't imagine that this peaceful, riverside enclave would become the lively residential neighborhood it is today. Between then and now, Yorkville has seen a lot of change. Tony mansions and elevated trains went up at the turn of the century and then came down in the postwar years as a middle-class population moved in.
                    - text: Now, the neighborhood is a haven of high-rise co-ops and condos interspersed with quiet rows of townhouses. The mixed housing stock makes Yorkville a practical choice for anyone seeking a slowed-down Manhattan vibe. Several avenues over from the throngs of Lexington and Third Avenues, Yorkville maintains a low-key, no-frills feel — it's a place where you'll find more diners and donut shops than upscale lounges and boutiques. This homey attitude is writ in its storefronts, where the food is kept simple and the owners are often from around the block.
                - link "Learn more about Yorkville" [ref=e676] [cursor=pointer]:
                  - /url: https://streeteasy.com/neighborhoods/yorkville

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SleepEasy — Room areas</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="app">
    <header>
      <span class="header-title">Sq Ft Analysis</span>
      <button id="settings-toggle" class="settings-btn" title="Backend settings" aria-label="Backend settings">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6.5 1L7.1 3.1a5 5 0 011.8 0L9.5 1h1l.6 2.1a5 5 0 011.3 1.3L14.5 3.8l.5.9-1.5 1.6c.2.6.2 1.2 0 1.8l1.5 1.5-.5.9-2.1-.6a5 5 0 01-1.3 1.3L12 14.5h-1l-.6-2.1a5 5 0 01-1.8 0L8 14.5H7l-.6-2.1a5 5 0 01-1.3-1.3L3 11.7l-.5-.9 1.5-1.5a5 5 0 010-1.8L2.5 5.9 3 5l2.1.6a5 5 0 011.3-1.3L5.8 2.2h1zM8.5 6a2.5 2.5 0 100 5 2.5 2.5 0 000-5z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </header>

    <div id="settings-panel" class="settings-panel hidden">
      <div class="settings-grid">
        <label class="settings-field">
          <span>Backend URL</span>
          <input id="backend-url" type="text" placeholder="http://127.0.0.1:8787" />
        </label>
        <label class="settings-field">
          <span>Device</span>
          <select id="backend-device">
            <option value="auto">Auto</option>
            <option value="mps">Apple Metal (MPS)</option>
            <option value="cpu">CPU</option>
          </select>
        </label>
        <label class="settings-field">
          <span>Analysis Mode</span>
          <select id="backend-analysis-mode">
            <option value="auto">Auto (DUSt3R multi-view, CUDA required)</option>
            <option value="single-image">Single-image mode (no CUDA required)</option>
          </select>
        </label>
      </div>
      <div class="settings-actions">
        <button id="backend-save" type="button">Save</button>
        <button id="backend-check" type="button">Check</button>
      </div>
      <div id="backend-status" class="settings-status"></div>
    </div>

    <div id="panel-notice" class="panel-notice hidden" role="status"></div>

    <main id="main-view">
      <section id="listings"></section>
    </main>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MoGe ONNX Web Probe</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        background: #0b0f14;
        color: #d7e3f0;
      }
      pre {
        background: #10161e;
        border: 1px solid #253244;
        border-radius: 8px;
        padding: 16px;
        overflow: auto;
        max-height: 80vh;
      }
      .ok {
        color: #57d38c;
      }
      .err {
        color: #ff7a7a;
      }
    </style>
  </head>
  <body>
    <h2>MoGe ONNX Browser Probe</h2>
    <div id="status">starting...</div>
    <pre id="out"></pre>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script>
      (async () => {
        const statusEl = document.getElementById("status");
        const outEl = document.getElementById("out");
        const qp = new URLSearchParams(window.location.search);
        const model = qp.get("model") || "../models/model.onnx";
        const provider = qp.get("provider") || "webgpu";
        const size = Number.parseInt(qp.get("size") || "320", 10);
        const runs = Number.parseInt(qp.get("runs") || "2", 10);
        const warmup = Number.parseInt(qp.get("warmup") || "1", 10);
        const numTokens = Number.parseInt(qp.get("num_tokens") || "1200", 10);

        const report = {
          model,
          providerRequested: provider,
          size,
          runs,
          warmup,
          numTokens,
          userAgent: navigator.userAgent,
          webgpuAvailable: !!navigator.gpu,
          timingMs: {},
        };

        function setStatus(text, cls) {
          statusEl.textContent = text;
          statusEl.className = cls || "";
        }

        try {
          setStatus("loading session...", "");
          const tLoad0 = performance.now();
          const session = await ort.InferenceSession.create(model, {
            executionProviders: [provider, "wasm"],
            graphOptimizationLevel: "all",
          });
          report.sessionInputNames = [...session.inputNames];
          report.sessionOutputNames = [...session.outputNames];
          report.timingMs.sessionLoad = performance.now() - tLoad0;

          const n = 1 * 3 * size * size;
          const data = new Float32Array(n);
          for (let i = 0; i < n; i++) data[i] = (i % 997) / 997.0;
          const feeds = {};
          for (const name of session.inputNames) {
            const lname = name.toLowerCase();
            if (lname.includes("token")) {
              // MoGe ONNX expects scalar int64 for num_tokens.
              feeds[name] = new ort.Tensor("int64", new BigInt64Array([BigInt(numTokens)]), []);
            } else {
              feeds[name] = new ort.Tensor("float32", data, [1, 3, size, size]);
            }
          }
          report.feedShapes = {};
          for (const [k, t] of Object.entries(feeds)) {
            report.feedShapes[k] = t.dims;
          }

          for (let i = 0; i < warmup; i++) await session.run(feeds);

          const lats = [];
          let lastOut = null;
          for (let i = 0; i < runs; i++) {
            const t0 = performance.now();
            lastOut = await session.run(feeds);
            lats.push(performance.now() - t0);
          }
          report.timingMs.latency = {
            runs: lats,
            mean: lats.reduce((a, b) => a + b, 0) / Math.max(1, lats.length),
          };

          report.outputShapes = {};
          for (const [k, v] of Object.entries(lastOut || {})) {
            report.outputShapes[k] = v.dims;
          }

          window.__probeResult = report;
          setStatus("ok", "ok");
          outEl.textContent = JSON.stringify(report, null, 2);
        } catch (err) {
          const msg = String(err && err.stack ? err.stack : err);
          const failure = { ...report, error: msg };
          window.__probeError = failure;
          setStatus("error", "err");
          outEl.textContent = JSON.stringify(failure, null, 2);
        }
      })();
    </script>
  </body>
</html>
